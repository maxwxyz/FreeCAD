<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="64px" height="64px" viewBox="0 0 64 64"
     version="1.1">
  <defs>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#729fcf;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#204a87;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:#f57900;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ce5c00;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Source box (semi-transparent) -->
  <rect x="4" y="22" width="24" height="24" rx="2"
        style="fill:url(#boxGrad);fill-opacity:0.4;stroke:#204a87;stroke-width:1.5"/>

  <!-- Destination box (solid) -->
  <rect x="36" y="22" width="24" height="24" rx="2"
        style="fill:url(#boxGrad);stroke:#204a87;stroke-width:1.5"/>

  <!-- Arrow shaft -->
  <rect x="28" y="31" width="8" height="2"
        style="fill:url(#arrowGrad)"/>

  <!-- Arrow head -->
  <polygon points="36,28 44,32 36,36"
           style="fill:url(#arrowGrad)"/>

  <!-- Bottom arrow indicating translation direction -->
  <line x1="8" y1="54" x2="56" y2="54"
        style="stroke:#f57900;stroke-width:2;marker-end:url(#arrowhead)"/>
</svg>
